spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL}
          predicates:
            - Path=/api/users/**
        - id: food-service
          uri: ${FOOD_SERVICE_URL}
          predicates:
            - Path=/api/foods/**
          filters:
            - RewritePath=/api/foods/(?<segment>.*), /foods/${segment}
        - id: order-service
          uri: ${ORDER_SERVICE_URL}
          predicates:
            - Path=/api/orders/**
          filters:
            - RewritePath=/api/orders/(?<segment>.*), /orders/${segment}
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL}
          predicates:
            - Path=/api/payments/**
          filters:
            - RewritePath=/api/payments/(?<segment>.*), /payments/${segment}

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowed-origins: ${FRONTEND_ORIGIN}
            allowed-methods: [GET, POST, PUT, DELETE, OPTIONS, PATCH]
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

server:
  port: 8085

logging:
  level:
    root: WARN
    com.foodorder.gateway: INFO

gateway:
  auth:
    service-url: ${USER_SERVICE_URL}
    verify-token-endpoint: "/api/users/verify-token"
