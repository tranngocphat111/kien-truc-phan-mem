spring.application.name=PersistenceWorker
server.port=8087

# ─── Database (MariaDB) ────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mariadb://192.168.1.67:3306/flash_sale
spring.datasource.username=team
spring.datasource.password=123456
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ─── JPA/Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Redis (Data Grid) ────────────────────────────────────────────────────────
spring.data.redis.host=192.168.1.67
spring.data.redis.port=6379
# spring.data.redis.password= (bỏ comment nếu Redis có mật khẩu)

# ─── RabbitMQ – Messaging ─────────────────────────────────────────────────────
spring.rabbitmq.host=192.168.1.67
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.iuh.fit.edu.persistenceworker=DEBUG
logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.data.redis=INFO
