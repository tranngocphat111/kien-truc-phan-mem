# Product Service Configuration

# Server
server.port=8081

# Logging
logging.level.root=INFO
logging.level.com.foodorder.product=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# Spring Actuator
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=when-authorized

# Redis Configuration
# Update host to your Redis server IP (e.g., 192.168.1.50)
spring.data.redis.host=192.168.1.67
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=10
spring.data.redis.jedis.pool.min-idle=5

# RabbitMQ Configuration
spring.rabbitmq.host=192.168.1.67
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=10000
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=1000
spring.rabbitmq.template.retry.max-interval=10000
spring.rabbitmq.template.retry.multiplier=2.0

# Application Custom Configuration
app.cache.ttl-seconds=120
app.s3.base-url=https://food-service-images.s3.ap-southeast-1.amazonaws.com/products
app.rabbitmq.mq-request-timeout-ms=5000

# Persistence Service MQ Configuration
app.persistence.request-queue=persistence.product.request
app.persistence.reply-queue=persistence.product.reply
app.persistence.exchange=persistence.exchange
app.persistence.routing-key.list-products=persistence.product.list
app.persistence.routing-key.product-by-id=persistence.product.get-by-id

# Stock/Inventory Configuration (Separated from Product)
# Redis: product data in "product:{id}", stock data in "stock:{productId}"
# Database: product in "products" table, stock in "inventory" table
# PU1 (Startup): Reads from DB (join products + inventory) -> Cache to Redis
# PU4: Updates stock directly on "stock:{productId}" key
app.persistence.routing-key.get-stock=persistence.stock.get
app.persistence.routing-key.update-stock=persistence.stock.update

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
