services:
  postgres:
    image: postgres:16-alpine
    container_name: bai11_postgres
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: bai11_adminer
    depends_on:
      - postgres
    ports:
      - "8083:8080"

volumes:
  postgres_data:
