services:
  mongo:
    image: mongo:latest
    container_name: bt2_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: bt2_node
    ports:
      - "3000:3000"
    environment:
      MONGO_URL: mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
