spring.application.name=FoodServices

# Database Configuration for MariaDB in LAN deployment
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://192.168.1.14:3306/food_ordering_db
spring.datasource.username=team
spring.datasource.password=123456

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Set real LAN IPs via env vars when deploying on different machines.
external.user-service.base-url=${USER_SERVICE_URL:http://192.168.137.106:8081}
server.port=8082

# Frontend LAN origin(s), comma-separated when multiple origins are needed.
# CORS Configuration (Handled by AppConfig.java - WebMvcConfigurer)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://192.168.1.79:3000,http://localhost:3000}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# AWS S3 Configuration
# Set `aws.s3.bucket` and `aws.region` for your S3 bucket. Credentials are loaded via the default
# AWS credentials provider chain (environment variables, shared credentials file, IAM role, etc.).
aws.s3.bucket=food-service-images
aws.region=ap-southeast-1

# File upload limits for food image CRUD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=20MB