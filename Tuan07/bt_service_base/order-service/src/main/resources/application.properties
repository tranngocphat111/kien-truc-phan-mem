spring.application.name=OrderService
server.port=8083

# MySQL settings for shared database in LAN deployment.
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://192.168.1.14:3306/food_ordering_db
spring.datasource.username=team
spring.datasource.password=123456

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update

# Set real LAN IPs via env vars when deploying on different machines.
external.user-service.base-url=http://192.168.1.79:8081
external.food-service.base-url=http://192.168.1.79:8082

# Frontend LAN origin(s), comma-separated when multiple origins are needed.
app.cors.allowed-origins=http://192.168.1.79:3000
