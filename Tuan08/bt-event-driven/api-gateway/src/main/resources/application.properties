server.port=8085

spring.cloud.gateway.routes[0].id=user-services
spring.cloud.gateway.routes[0].uri=http://192.168.1.8:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[0].filters[0]=RemoveRequestHeader=Origin

spring.cloud.gateway.routes[1].id=auth-compat-service
spring.cloud.gateway.routes[1].uri=http://192.168.1.8:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/auth/**
spring.cloud.gateway.routes[1].filters[0]=RemoveRequestHeader=Origin

spring.cloud.gateway.routes[2].id=movie-service
spring.cloud.gateway.routes[2].uri=http://192.168.1.8:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/movies/**
spring.cloud.gateway.routes[2].filters[0]=RemoveRequestHeader=Origin

spring.cloud.gateway.routes[3].id=showtime-service
spring.cloud.gateway.routes[3].uri=http://192.168.1.8:8082
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/showtimes/**
spring.cloud.gateway.routes[3].filters[0]=RemoveRequestHeader=Origin

spring.cloud.gateway.routes[4].id=booking-service
spring.cloud.gateway.routes[4].uri=http://192.168.1.8:8083
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/bookings/**
spring.cloud.gateway.routes[4].filters[0]=RemoveRequestHeader=Origin

spring.cloud.gateway.routes[5].id=payment-service
spring.cloud.gateway.routes[5].uri=http://192.168.1.8:8084
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.routes[5].filters[0]=RemoveRequestHeader=Origin

spring.cloud.gateway.routes[6].id=payment-websocket
spring.cloud.gateway.routes[6].uri=ws://192.168.1.8:8084
spring.cloud.gateway.routes[6].predicates[0]=Path=/ws/**

management.endpoints.web.exposure.include=health,info

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=http://192.168.1.8:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].add-to-simple-url-handler-mapping=true

logging.level.org.springframework.cloud.gateway=DEBUG