# Application name and port
spring.application.name=user-service
server.port=8081
server.servlet.context-path=/

# Database Configuration (MariaDB)
# Shared database: food_ordering_db (tất cả service)
# User Service chỉ quản lý bảng: users, token_blacklist
spring.datasource.url=jdbc:mariadb://localhost:3306/movie_ticket_db
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=12345


# JPA/Hibernate Configuration
# validate: kiểm tra schema phù hợp (không tạo/sửa table)
# update: tạo table nếu chưa có, không xóa dữ liệu
# Dùng 'update' vì User Service cần tạo bảng token_blacklist
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.foodorder.user=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# JWT Configuration
jwt.secret=mynoonersecretkeyforfoodorderingsystemminibysoftware
jwt.expiration=86400000

# CORS Configuration
server.tomcat.threads.max=200

# MariaDB Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# MariaDB Character Set
spring.datasource.hikari.data-source-properties.useUnicode=true
spring.datasource.hikari.data-source-properties.characterEncoding=UTF-8

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
